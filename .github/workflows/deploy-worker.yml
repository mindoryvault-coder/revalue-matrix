name: Deploy REVALUE API Worker

on:
  push:
    branches: ["main"]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Create Worker secrets file
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SITE_ACCESS_TOKEN: ${{ secrets.SITE_ACCESS_TOKEN }}
          VWORLD_API_KEY: ${{ secrets.VWORLD_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          MOLIT_BUILDING_API_KEY: ${{ secrets.MOLIT_BUILDING_API_KEY }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const required = [
            "CLOUDFLARE_API_TOKEN",
            "CLOUDFLARE_ACCOUNT_ID",
            "SITE_ACCESS_TOKEN",
            "VWORLD_API_KEY",
          ];
          const missing = required.filter((name) => !String(process.env[name] || "").trim());
          if (missing.length) {
            console.error(`Missing required GitHub Secrets: ${missing.join(", ")}`);
            process.exit(1);
          }
          const secrets = {};
          for (const name of ["SITE_ACCESS_TOKEN", "VWORLD_API_KEY", "KAKAO_REST_API_KEY", "MOLIT_BUILDING_API_KEY", "DATA_GO_KR_API_KEY"]) {
            const value = String(process.env[name] || "").trim();
            if (value) secrets[name] = value;
          }
          fs.writeFileSync(".worker-secrets.json", JSON.stringify(secrets));
          NODE

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest deploy --config wrangler.toml --secrets-file .worker-secrets.json
